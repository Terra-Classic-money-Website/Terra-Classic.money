name: Website analytics feed

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Generate website analytics feed
        run: node scripts/generate-website-analytics.mjs
        env:
          GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}
          GOOGLE_ANALYTICS_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_ANALYTICS_SERVICE_ACCOUNT_JSON }}
          WEBSITE_ANALYTICS_STRICT: "1"
      - name: Build and check performance budgets
        run: npm run check
        env:
          VITE_BASE_PATH: "/"
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./dist
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
